name: Recycling Reminder - 65th

on:
  schedule:
    - cron: '46 0 * * 1'  # Every Monday 00:46 UTC = Sunday 4:46pm PST
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python recycling_reminder.py 65th
        env:
          HOSPITABLE_PAT: ${{ secrets.HOSPITABLE_PAT }}
