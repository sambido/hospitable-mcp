name: Recycling Reminder - 65th

on:
  schedule:
    - cron: '46 0 * * 1'  # Every Monday 00:46 UTC = Sunday 4:46pm PST
    - cron: '16 1 * * 1'  # Backup: Monday 01:16 UTC = Sunday 5:16pm PST (30min later)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python recycling_reminder.py 65th
        env:
          HOSPITABLE_PAT: ${{ secrets.HOSPITABLE_PAT }}
      - name: Alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
            -d '{"text":"🚨 *Recycling Reminder - 65th* failed.\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"}'
          curl -s -X POST 'https://api.notion.com/v1/pages' \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "{\"parent\":{\"database_id\":\"32f50c17-99cc-816f-9f25-e5d8a68ec075\"},\"properties\":{\"Name\":{\"title\":[{\"text\":{\"content\":\"Recycling Reminder - 65th\"}}]},\"Source\":{\"select\":{\"name\":\"GitHub Actions\"}},\"Status\":{\"select\":{\"name\":\"New\"}},\"Timestamp\":{\"date\":{\"start\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}},\"Run URL\":{\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}}"
