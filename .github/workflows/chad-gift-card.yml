name: Chad Gift Card Reminder
on:
  schedule:
    # Script checks actual Pacific time (auto PST/PDT) before sending
    - cron: '0 16 * * *'   # 9am PT — morning-of reminder
    - cron: '0 18 * * *'   # 11am PT — day-before reminder
    - cron: '0 20 * * *'   # 1pm PT — 3-day reminder
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run gift card check
        env:
          HOSPITABLE_PAT: ${{ secrets.HOSPITABLE_PAT }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          QUO_API_KEY: ${{ secrets.QUO_API_KEY }}
        run: python chad_gift_card.py
      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Chad gift card automation failed. <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
