name: Chad Gift Card Reminder
on:
  schedule:
    # Run at 16, 18, 20, 21 UTC — covers 9am/11am/1pm in both PST and PDT
    # The script checks actual Pacific time and only sends the matching message
    # 20:50 UTC is temporary for testing (~1:50pm PDT on Apr 3)
    - cron: '50 20 * * *'
    - cron: '0 16 * * *'
    - cron: '0 18 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run gift card check
        env:
          HOSPITABLE_PAT: ${{ secrets.HOSPITABLE_PAT }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          QUO_API_KEY: ${{ secrets.QUO_API_KEY }}
        run: python chad_gift_card.py
      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Chad gift card automation failed. <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
