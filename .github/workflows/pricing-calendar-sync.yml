name: Pricing Calendar Sync (Chad)

on:
  schedule:
    - cron: '0 15 * * *'   # 7am PST
    - cron: '0 21 * * *'   # 1pm PST
    - cron: '0 5 * * *'    # 9pm PST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python sync_pricing_calendar.py
        env:
          HOSPITABLE_PAT: ${{ secrets.HOSPITABLE_PAT }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      - name: Alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" -H 'Content-type: application/json' \
            -d '{"text":"🚨 *Pricing Calendar Sync* failed.\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"}'
          curl -s -X POST 'https://api.notion.com/v1/pages' \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "{\"parent\":{\"database_id\":\"32f50c17-99cc-816f-9f25-e5d8a68ec075\"},\"properties\":{\"Name\":{\"title\":[{\"text\":{\"content\":\"Pricing Calendar Sync\"}}]},\"Source\":{\"select\":{\"name\":\"GitHub Actions\"}},\"Status\":{\"select\":{\"name\":\"New\"}},\"Timestamp\":{\"date\":{\"start\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}},\"Run URL\":{\"url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}}"
