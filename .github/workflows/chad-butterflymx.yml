name: ButterflyMX Code Reminder
on:
  schedule:
    # 11am PT — covers both PST (19 UTC) and PDT (18 UTC)
    - cron: '0 18 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run ButterflyMX check
        env:
          HOSPITABLE_PAT: ${{ secrets.HOSPITABLE_PAT }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          QUO_API_KEY: ${{ secrets.QUO_API_KEY }}
        run: python chad_butterflymx.py
      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"ButterflyMX automation failed. <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
